<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shih-Hsin Wang — Notes & Guides</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #fffdfc;
            --text: #1a2b3c;
            --text-muted: #5a6b7d;
            --accent: #c65d4a;
            --box-math-bg: #eef2f6;
            --box-ml-bg: #fcf6f1;
            --border: #e6e9ed;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            line-height: 1.65;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }

        .category-nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cat-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .cat-btn.active-cat {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .lang-switch button {
            border: 1px solid var(--border);
            background: none;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .lang-switch button:hover {
            color: var(--accent);
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            flex-grow: 1;
        }

        .sidebar {
            background-color: var(--box-ml-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
        }

        .note-list button {
            width: 100%;
            text-align: left;
            border: none;
            background: none;
            padding: 8px;
            cursor: pointer;
        }

        .note-list button.active-note {
            background-color: var(--accent);
            color: white;
        }

        .content {
            padding: 40px;
            overflow-y: auto;
        }
        /* ===== Table Styling (Fix cramped layout) ===== */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.95rem;
        }
        
        .markdown-body th,
        .markdown-body td {
            border: 1px solid var(--border);
            padding: 12px 14px;   /* ⭐ 關鍵：讓內容有空間 */
            text-align: left;
            vertical-align: top;
            line-height: 1.6;
        }
        
        .markdown-body th {
            background-color: var(--box-ml-bg);
            font-weight: 600;
        }
        
        .markdown-body tr:nth-child(even) {
            background-color: #fafafa;
        }
        
        /* ⭐ 讓長句子自動換行（非常重要） */
        .markdown-body td {
            word-break: break-word;
        }
        
        /* ⭐ 避免第一欄太窄 */
        .markdown-body td:first-child,
        .markdown-body th:first-child {
            width: 140px;
            white-space: nowrap;
        }
        .markdown-body {
    max-width: 900px;   /* 原本 800 可以稍微放寬 */
}

        .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;   /* ⭐ 讓瀏覽器自動分配 */
}

        @media (max-width: 768px) {
    .markdown-body table {
        display: block;
        overflow-x: auto;
    }

    .category-nav {
        flex-wrap: wrap;
        gap: 10px;
    }

    header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    /* 🔥 1. grid → single column */
    .main-container {
        display: block;
    }

    /* 🔥 2. sidebar 變 top bar */
    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 10px;
    }

    /* 🔥 3. note list → 橫向 scroll */
    .note-list {
        display: flex;
        overflow-x: auto;
        gap: 8px;
    }

    .note-list li {
        flex: 0 0 auto;
    }

    .note-list button {
        white-space: nowrap;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 6px 12px;
    }

    /* 🔥 4. content 滿版 */
    .content {
        padding: 20px;
    }

    /* 🔥 5. markdown 不要限制寬度 */
    .markdown-body {
        max-width: 100%;
    }
}
    </style>
</head>

<body>

<header>
    <a href="index.html" class="back-btn">← Back</a>

    <div class="category-nav">
        <button class="cat-btn active-cat" onclick="loadCategory('writing', event)">Writing</button>
        <button class="cat-btn" onclick="loadCategory('research', event)">Research</button>

        <div class="lang-switch">
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('zh')">中文</button>
        </div>
    </div>
</header>

<div class="main-container">

    <aside class="sidebar">
        <h3 id="sidebar-title"></h3>
        <ul class="note-list" id="note-list-container"></ul>
    </aside>

    <main class="content">
        <div id="markdown-content" class="markdown-body">Loading...</div>
    </main>

</div>

<script>

let currentLang = localStorage.getItem("lang") || "en";

const notesData = {
    "writing": [
        {
            title: {
                en: "Writing a Strong Introduction",
                zh: "如何寫一個有說服力的 Introduction"
            },
            file: {
                en: "notes/en/write-intro.md",
                zh: "notes/zh/write-intro.md"
            }
        }
    ],
    "research": [
        {
            title: {
                en: "Flow Matching",
                zh: "Flow Matching 筆記"
            },
            file: {
                en: "notes/en/flow-matching.md",
                zh: "notes/zh/flow-matching.md"
            }
        }
    ]
};

const categoryTitles = {
    "writing": { en: "Writing Skills", zh: "寫作技巧" },
    "research": { en: "Research Topics", zh: "研究主題" }
};

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("lang", lang);

    // ⭐ Save the currently active category and note
    const activeCategoryBtn = document.querySelector('.cat-btn.active-cat');
    const activeCategory = activeCategoryBtn ? activeCategoryBtn.textContent.toLowerCase() : "writing";

    const activeNoteBtn = document.querySelector('.note-list button.active-note');
    const activeNoteFile = activeNoteBtn ? activeNoteBtn.getAttribute("data-file") : null;

    // Reload the same category but in the new language
    loadCategory(activeCategory, { target: activeCategoryBtn });

    // After loadCategory, restore the same note in the new language
    if (activeNoteFile) {
        const listContainer = document.getElementById('note-list-container');
        const btnToClick = Array.from(listContainer.querySelectorAll('button'))
                                .find(b => b.innerText === activeNoteBtn.innerText);
        if (btnToClick) {
            loadMarkdown(btnToClick.getAttribute("data-file"), btnToClick, activeCategory, btnToClick.getAttribute("data-file"));
        }
    }
}

function loadCategory(categoryId, event) {
    // ⭐ Always update active tab (NOT dependent on event)
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('active-cat');

        // match based on onclick content
        if (btn.getAttribute("onclick").includes(categoryId)) {
            btn.classList.add('active-cat');
        }
    });

    document.getElementById('sidebar-title').innerText =
        categoryTitles[categoryId][currentLang];

    const listContainer = document.getElementById('note-list-container');
    listContainer.innerHTML = '';

    notesData[categoryId].forEach(note => {
        const li = document.createElement('li');
        const btn = document.createElement('button');

        btn.innerText = note.title[currentLang];
        btn.setAttribute("data-file", note.file[currentLang]); // ⭐ store file path for easy lookup
        btn.onclick = (e) => loadMarkdown(note.file[currentLang], e.target, categoryId, note.file[currentLang]);

        li.appendChild(btn);
        listContainer.appendChild(li);
    });

    // Restore previously selected note for this category, if any
    let savedNote = localStorage.getItem("currentNote-" + categoryId);
    let btnToClick;
    if (savedNote) {
        btnToClick = Array.from(listContainer.querySelectorAll('button'))
                          .find(b => b.getAttribute("data-file") === savedNote);
    }
    if (!btnToClick) {
        btnToClick = listContainer.querySelector('button'); // default to first note
    }

    if (btnToClick) {
        loadMarkdown(btnToClick.getAttribute("data-file"), btnToClick, categoryId, btnToClick.getAttribute("data-file"));
    }
}

async function loadMarkdown(filePath, btnElement, categoryId, noteFile) {
    document.querySelectorAll('.note-list button').forEach(b => b.classList.remove('active-note'));
    if (btnElement) btnElement.classList.add('active-note');

    // ⭐ Save current state to localStorage
    localStorage.setItem("currentCategory", categoryId);
    localStorage.setItem("currentNote-" + categoryId, noteFile);

    const contentDiv = document.getElementById('markdown-content');
    contentDiv.innerHTML = "Loading...";

    try {
        const res = await fetch(filePath);
        const text = await res.text();
        contentDiv.innerHTML = marked.parse(text);
    } catch {
        contentDiv.innerHTML = "File not found.";
    }
}

window.onload = () => {
    let lastCategory = localStorage.getItem("currentCategory") || "writing";
    loadCategory(lastCategory);
};

</script>

</body>
</html>
